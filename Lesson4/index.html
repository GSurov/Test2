<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bento-grid">
        <div class="card hero">
            <img src="https://www.neverendingvoyage.com/wp-content/uploads/2019/09/kyoto-japan-26.jpg" alt="Kyoto">
            <div class="content">
                <h2>Киото</h2>
                <p>Древняя столица</p>
            </div>
        </div>

        <div class="card weather">
            <div class="temp">24°</div>
            <div>Солнечно</div>
        </div>

        <div class="card tea">
            <img src="https://iswari.s3.eu-west-3.amazonaws.com/blog/sc4jfi-.jpg" alt="Matcha Tea">
            <div class="badge">Matcha Time</div>
        </div>

        <div class="card sidebar">
            <h3>Лучшие места</h3>
            <ul>
                <li>⛩ Фусими Инари</li>
                <li>🌸 Парк Маруяма</li>
                <li>🏯 Замок Нидзё</li>
                <li>🍵 Дом чая</li>
            </ul>
        </div>

        <div class="card booking">
            <p>Забронировать тур в древнюю столицу</p>
            <button class="btn">→</button>
        </div>
    </div>
</body>
</html>
